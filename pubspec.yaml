msix_config:
  display_name: X-Schedule
  publisher_display_name: Saint Xavier HS
  identity_name: org.stxavier.xschedule
  msix_version: 1.0.67+54
  logo_path: windows\runner\resources\app_icon.ico
  capabilities: internetClient